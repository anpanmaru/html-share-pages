async function unlock(){
  var pw=document.getElementById('pw').value;
  if(!pw)return;
  try{
    var enc=new TextEncoder(),dec=new TextDecoder();
    var salt=b64ToBuf(ENC.salt),iv=b64ToBuf(ENC.iv),data=b64ToBuf(ENC.data);
    var km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,data);
    var payload=JSON.parse(dec.decode(plain));
    document.title=payload.filename;
    document.getElementById('unlockUI').style.display='none';
    var f=document.getElementById('viewer');
    f.style.display='block';
    f.srcdoc=payload.html;
  }catch(e){
    var err=document.getElementById('err');err.style.display='block';
    setTimeout(function(){err.style.display='none'},2000);
  }
}
